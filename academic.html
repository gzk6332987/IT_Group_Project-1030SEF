<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Record - SMS</title>
    <link rel="stylesheet" href="src/style.css">
    <style>
        /* Modern Academic Table Styling */
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f8f9fa;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .record-card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 700px;
        }

        .header-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #333;
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        .student-meta {
            color: #555;
            font-size: 0.9rem;
        }

        .student-meta b {
            color: #000;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }

        th {
            background-color: #333;
            color: white;
            text-align: left;
            padding: 12px;
            font-size: 0.9rem;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #eee;
            font-size: 0.95rem;
        }

        tr:hover {
            background-color: #fcfcfc;
        }

        /* Grade Color Coding */
        .grade-a {
            color: #28a745;
            font-weight: bold;
        }

        .grade-b {
            color: #007bff;
            font-weight: bold;
        }

        .gpa-banner {
            background: #333;
            color: white;
            padding: 15px;
            border-radius: 8px;
            text-align: right;
            font-size: 1.1rem;
        }

        .btn-back {
            display: inline-block;
            margin-top: 20px;
            text-decoration: none;
            color: #666;
            font-size: 0.9rem;
            transition: color 0.2s;
        }

        .btn-back:hover {
            color: #000;
        }
    </style>
</head>

<body>
    <div class="record-card">
        <div class="header-info">
            <h2>Academic Transcript</h2>
            <div class="student-meta">
                ID: <b id="display-userid">Guest</b><br>
                Semester: <b>2026 Spring</b>
            </div>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Course Code</th>
                    <th>Course Title</th>
                    <th>Credits</th>
                    <th>Grade</th>
                </tr>
            </thead>
            <tbody id="grades-body">
                <!-- Data will be injected here -->
            </tbody>
        </table>

        <div class="gpa-banner">
            Cumulative GPA: <span id="gpa-value">--</span>
        </div>

        <a href="index.html" class="btn-back">← Return to Dashboard</a>
    </div>

    <script src="src/main.js"></script>
    <script>
        /**
         * Load Mock Academic Data
         */
        function loadAcademicData() {
            if (isLogin()) {
                // Set Student ID from localStorage
                const userid = localStorage.getItem("userid") || "Not Logged In";
                document.getElementById("display-userid").innerText = userid;

                // TODO Mock Course Data
                const courses = [
                    { code: "COMP2090SEF", title: "Data Structures & Algorithms", credit: 5, grade: "A" },
                    { code: "COMP1010SEF", title: "Introduction to Programming", credit: 5, grade: "A-" },
                    { code: "MATH1020SEF", title: "Discrete Mathematics", credit: 3, grade: "B+" },
                    { code: "ENGL2030SEF", title: "University English", credit: 3, grade: "B" }
                ];

                const tbody = document.getElementById("grades-body");
                let rows = "";

                courses.forEach(c => {
                    const gradeClass = c.grade.startsWith('A') ? 'grade-a' : 'grade-b';
                    rows += `
                    <tr>
                        <td>${c.code}</td>
                        <td>${c.title}</td>
                        <td>${c.credit}</td>
                        <td class="${gradeClass}">${c.grade}</td>
                    </tr>
                `;
                });

                tbody.innerHTML = rows;
                document.getElementById("gpa-value").innerText = "3.72"; // Mock GPA
            } else {
                alert("Please login first to see your academic result!");
                document.getElementById("display-userid").innerHTML = '<span style="color: red;">You are logged out!</span>';
            }
        } 


        // Initialize on load
        window.onload = loadAcademicData;

    </script>
</body>

</html>
